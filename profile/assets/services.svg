<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 90" fill="none">
  <defs>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Top accent -->
  <rect x="0" y="0" width="900" height="2.5" fill="url(#emerald)" opacity="0.6"/>

  <!-- 6 Service Icons -->
  <!-- Software -->
  <rect x="18" y="18" width="130" height="55" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="83" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">💻</text>
  <text x="83" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#059669" font-weight="700">Software</text>

  <!-- IT-Sicherheit -->
  <rect x="163" y="18" width="130" height="55" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="228" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">🛡️</text>
  <text x="228" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#dc2626" font-weight="700">IT-Sicherheit</text>

  <!-- IT-Services -->
  <rect x="308" y="18" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="373" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">🖥️</text>
  <text x="373" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#2563eb" font-weight="700">IT-Services</text>

  <!-- Cloud -->
  <rect x="453" y="18" width="130" height="55" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="518" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">☁️</text>
  <text x="518" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#0891b2" font-weight="700">Cloud &amp; Netzwerk</text>

  <!-- Schulungen -->
  <rect x="598" y="18" width="130" height="55" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="663" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">🎓</text>
  <text x="663" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#d97706" font-weight="700">Schulungen</text>

  <!-- Webdesign -->
  <rect x="743" y="18" width="140" height="55" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="813" y="42" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">🎨</text>
  <text x="813" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#7c3aed" font-weight="700">Webdesign &amp; SEO</text>

  <!-- Bottom accent -->
  <rect x="0" y="87" width="900" height="2.5" fill="url(#emerald)" opacity="0.6"/>
</svg>