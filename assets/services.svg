<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.04)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.01)"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Service Cards -->
  <!-- Software Development -->
  <g transform="translate(20, 20)">
    <rect width="145" height="160" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
    <!-- Code icon -->
    <g transform="translate(52, 30)" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round">
      <polyline points="6,4 0,10 6,16"/>
      <polyline points="14,4 20,10 14,16"/>
      <line x1="12" y1="2" x2="8" y2="18"/>
    </g>
    <text x="72" y="75" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">Software</text>
    <text x="72" y="90" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">Development</text>
    <text x="72" y="115" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">Custom apps, APIs</text>
    <text x="72" y="128" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">&amp; web platforms</text>
  </g>

  <!-- IT Services -->
  <g transform="translate(175, 20)">
    <rect width="145" height="160" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
    <!-- Server icon -->
    <g transform="translate(52, 30)" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round">
      <rect x="0" y="0" width="20" height="8" rx="2"/>
      <rect x="0" y="12" width="20" height="8" rx="2"/>
      <circle cx="4" cy="4" r="1" fill="#10b981"/>
      <circle cx="4" cy="16" r="1" fill="#10b981"/>
    </g>
    <text x="72" y="75" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">IT Services</text>
    <text x="72" y="90" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">&amp; Consulting</text>
    <text x="72" y="115" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">Managed services,</text>
    <text x="72" y="128" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">strategy &amp; support</text>
  </g>

  <!-- IT Security -->
  <g transform="translate(330, 20)">
    <rect width="145" height="160" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
    <!-- Shield icon -->
    <g transform="translate(52, 30)" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M10 1 L19 5 L19 11 C19 16 10 20 10 20 C10 20 1 16 1 11 L1 5 Z"/>
      <polyline points="6,10 9,13 14,8"/>
    </g>
    <text x="72" y="75" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">IT Security</text>
    <text x="72" y="90" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">&amp; Compliance</text>
    <text x="72" y="115" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">Pentesting, audits</text>
    <text x="72" y="128" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">&amp; GDPR compliance</text>
  </g>

  <!-- Cloud & Network -->
  <g transform="translate(485, 20)">
    <rect width="145" height="160" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
    <!-- Cloud icon -->
    <g transform="translate(52, 30)" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M16 18H5a4 4 0 0 1-.8-7.9 5.5 5.5 0 0 1 10.6-1 3.5 3.5 0 0 1 1.2 6.9z"/>
    </g>
    <text x="72" y="75" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">Cloud &amp;</text>
    <text x="72" y="90" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">Network</text>
    <text x="72" y="115" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">Cloud migration,</text>
    <text x="72" y="128" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">hybrid infrastructure</text>
  </g>

  <!-- Training -->
  <g transform="translate(640, 20)">
    <rect width="145" height="160" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="0" y="0" width="145" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
    <!-- Graduation cap icon -->
    <g transform="translate(52, 30)" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round">
      <polygon points="10,0 20,6 10,12 0,6"/>
      <polyline points="4,8 4,15 10,18 16,15 16,8"/>
      <line x1="20" y1="6" x2="20" y2="14"/>
    </g>
    <text x="72" y="75" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">Training &amp;</text>
    <text x="72" y="90" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#f1f5f9" text-anchor="middle">Workshops</text>
    <text x="72" y="115" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">Security, cloud</text>
    <text x="72" y="128" font-family="'Inter', sans-serif" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">&amp; dev training</text>
  </g>
</svg>
