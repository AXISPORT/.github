<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="50%" style="stop-color:#08080e"/>
      <stop offset="100%" style="stop-color:#0f0f18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
  </g>

  <!-- Decorative glow orbs -->
  <circle cx="200" cy="150" r="180" fill="url(#glowGrad)" opacity="0.4"/>
  <circle cx="950" cy="280" r="150" fill="url(#glowGrad)" opacity="0.25"/>
  <circle cx="600" cy="50" r="100" fill="#14b8a6" opacity="0.03"/>

  <!-- Neural network dots -->
  <g opacity="0.15" fill="#10b981">
    <circle cx="100" cy="80" r="2"/><circle cx="180" cy="120" r="1.5"/>
    <circle cx="250" cy="60" r="2"/><circle cx="320" cy="140" r="1.5"/>
    <circle cx="900" cy="100" r="2"/><circle cx="980" cy="60" r="1.5"/>
    <circle cx="1050" cy="130" r="2"/><circle cx="1100" cy="80" r="1.5"/>
    <circle cx="150" cy="300" r="1.5"/><circle cx="220" cy="340" r="2"/>
    <circle cx="950" cy="320" r="1.5"/><circle cx="1080" cy="290" r="2"/>
  </g>

  <!-- Neural network connections -->
  <g opacity="0.06" stroke="#10b981" stroke-width="0.5">
    <line x1="100" y1="80" x2="180" y2="120"/>
    <line x1="180" y1="120" x2="250" y2="60"/>
    <line x1="250" y1="60" x2="320" y2="140"/>
    <line x1="900" y1="100" x2="980" y2="60"/>
    <line x1="980" y1="60" x2="1050" y2="130"/>
    <line x1="1050" y1="130" x2="1100" y2="80"/>
    <line x1="150" y1="300" x2="220" y2="340"/>
    <line x1="950" y1="320" x2="1080" y2="290"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Logo: Axis -->
  <text x="440" y="175" font-family="'Sora', 'Inter', 'Segoe UI', sans-serif" font-weight="700" font-size="72" fill="#f1f5f9" filter="url(#glow)">Axis</text>
  <!-- Logo: /Port. -->
  <text x="630" y="175" font-family="'Sora', 'Inter', 'Segoe UI', sans-serif" font-weight="300" font-size="72" fill="#f1f5f9" filter="url(#glow)">/Port.</text>
  <!-- Accent dot on the period -->

  <!-- Gradient underline -->
  <rect x="440" y="190" width="340" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="600" y="240" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="400" font-size="20" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Software · IT-Services · Security — Made in Germany</text>

  <!-- Badge -->
  <rect x="475" y="270" width="250" height="36" rx="18" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
  <text x="600" y="293" font-family="'JetBrains Mono', 'Fira Code', monospace" font-weight="400" font-size="13" fill="#10b981" text-anchor="middle" letter-spacing="1">WE BUILD THE DIGITAL FUTURE</text>

  <!-- Bottom accent line -->
  <rect x="0" y="398" width="1200" height="2" fill="url(#accent)" opacity="0.4"/>
</svg>
